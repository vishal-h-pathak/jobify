<form id="application_form">
  <div class="field">
    <label for="name">Full Name</label>
    <input id="name" name="name" type="text" required>
  </div>
  <div class="field">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>
  </div>
  <div class="field">
    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel" required>
  </div>
  <div class="field">
    <label for="urls_linkedin">LinkedIn</label>
    <input id="urls_linkedin" name="urls[LinkedIn]" type="text">
  </div>
  <div class="field">
    <label for="org">Current Company</label>
    <input id="org" name="org" type="text">
  </div>
  <div class="field">
    <label for="resume">Resume/CV</label>
    <input id="resume" type="file" name="resume" required>
  </div>
  <div class="field">
    <label for="comments">Additional Information</label>
    <textarea id="comments" name="comments"></textarea>
  </div>
  <button type="submit">Submit application</button>
</form>
