# board_catalog_seed.yml — HUNT2 P1 S2 (planning/HUNT2_SOURCES.md §3.3),
# extended by P1 S3 (planning/HUNT2_SOURCES.md §3.4) session 50.
#
# Initial seed (S2) for the global `board_catalog` table. Source: exactly
# the ats/slug/name triples from the owner's job-pipeline
# `jobpipe/hunt/profile/portals.yml` (51 hand-verified boards: 19
# Greenhouse, 32 Ashby) — no other content from that file (title filters,
# notes, the owner's name) was copied. `tags` are a curation-time judgment
# call against the fixed vocabulary below, made fresh for this catalog —
# see the S2 session report for uncertain calls (mostly hardware/biotech
# companies the vocabulary doesn't have a clean tag for).
#
# S3 additions (session 50, verified live 2026-07-21): 126 new boards —
# 75 Greenhouse, 44 Ashby, 3 Lever, 6 Workday — bringing the catalog to
# 177 total, spanning all four wired ATS platforms and broadening beyond
# S2's data-ai/infra depth into fintech, devtools, product SaaS, and
# enterprise (including three Atlanta-area/hybrid Workday tenants: Home
# Depot, NCR Voyix, and Global Payments' Worldpay/TSYS tenants). Every S3
# board was verified live during this session: fetched its real public
# API endpoint, confirmed HTTP 200 with the response's own company-name
# field (Greenhouse `jobs[].company_name`) or, where the ATS doesn't
# return one (Ashby/Lever/Workday), confirmed a live job's own title/
# description/URL self-references the intended company — full per-board
# verification table in the S3 session report, not repeated per-line
# here (matches this file's existing no-per-line-comment convention).
# `greenhouse` (yes, cataloging the ATS vendor itself) is Greenhouse
# Software's own real, live job board — not a mistake.
#
# tags vocabulary: infra, devtools, product, fintech, data-ai, enterprise,
# growth-startup, big-tech-adjacent, remote-first
#
# Imported by web/scripts/importBoardCatalog.ts (idempotent upsert on
# (ats, slug)). Not run by this commit — the cockpit runs it once 0015 is
# applied live.

