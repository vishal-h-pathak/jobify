# Vishal Pathak — ATS Portal Map (J-1)
#
# USER-LAYER. Hand-edited list of companies the hunter polls directly via
# their ATS APIs (Greenhouse, Lever, Ashby, Workday). Discovery is
# zero-token: pure HTTP/JSON, no Anthropic spend until a posting passes
# the title pre-filter and reaches the scorer.
#
# To add a company:
#   1. Find the ATS slug (visit the careers page; the URL usually gives
#      it away — e.g. boards.greenhouse.io/<slug>, jobs.ashbyhq.com/<slug>,
#      jobs.lever.co/<slug>, <tenant>.wd1.myworkdayjobs.com/<site>).
#   2. VERIFY the board API returns jobs (curl it), then drop the row in
#      the matching `companies:` list below with the verification URL as
#      a comment.
#   3. Run the hunter once and check `agent.log` for warnings — slugs
#      that 404 are dropped silently with a warning so they don't break
#      the run, but you should still remove dead entries.
#
# 2026-06-12 (Session G, feat/hunt-thesis): every board below was
# re-verified by fetching its API and confirming it returns jobs for the
# RIGHT company. Boards that 404'd were fixed (slug moved) or removed;
# thesis target companies without a pollable Greenhouse/Lever/Ashby/
# Workday board are listed at the bottom under "Skipped".

