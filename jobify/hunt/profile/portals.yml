# ──────────────────────────────────────────────────────────────────────────
# Title pre-filter — applied BEFORE LLM scoring (J-1).
# Pure substring match (case-insensitive). Cheap, conservative.
# ──────────────────────────────────────────────────────────────────────────
title_filter:
  # Auto-skip titles containing any of these terms. Real disqualifiers
  # only — we'd rather over-LLM-score than miss a Tier 1 role because of
  # a noisy keyword. Be selective.
  reject_substrings:
    - "internship"
    - "intern,"
    - "intern - "
    - "vp of"
    - "vice president"
    - "chief executive"
    - "ceo"
    - "cfo"
    - "coo"
    - "cmo"
    - "hr business partner"
    - "recruiter"
    - "talent acquisition"
    - "executive assistant"
    - "office manager"
    - "office coordinator"
    - "social media manager"

  # Always score titles containing any of these — strong positive signal.
  # Used to log a hint in agent.log; doesn't gate filtering.
  prefer_substrings:
    - "neuromorphic"
    - "spiking"
    - "connectom"
    - "neural"
    - "neuroscience"
    - "bci"
    - "brain-computer"
    - "neurotech"
    - "neuroprosth"
    - "applied scientist"
    - "research engineer"
    - "research scientist"
    - "ml engineer"
    - "machine learning engineer"
    - "computer vision"
    - "sales engineer"
    - "solutions engineer"
    - "developer relations"
    - "developer advocate"
    - "ai engineer"
    # Session G (thesis Tier 1.5) — agentic / applied AI titles
    - "agent engineer"
    - "applied ai"
    - "forward deployed"
    - "member of technical staff"
    # feat/hunt-agentic-discovery — more agentic title hints (log-only)
    - "agentic"
    - "ai agent"
    - "llm engineer"
    - "developer experience"

  # Soft seniority hint — boosts logging only. Both individual contributors
  # and senior IC titles are welcome; what we filter against is leadership
  # (already handled in reject_substrings).
  seniority_substrings:
    - "senior"
    - "staff"
    - "principal"
    - "lead"
    - "sr."
    - "sr "
