name: hosted-hunt

# OPT-IN on a fork, same posture as hunt.yml. Nothing runs until you add
# the repository secrets read below. `workflow_dispatch` lets you run it
# manually any time; the `schedule:` block below runs it daily on cron.
#
# This is the H4 hosted (multitenant) worker: one cycle = global
# discovery (jobify.hosted.discovery.run_discovery_cycle — fills the
# shared `postings` pool once) THEN per-user fan-out scoring
# (jobify.hosted.fanout.run_fanout_cycle), composed by the
# `jobify-hosted-hunt` console script (jobify.hosted.worker:run).
#
# Deliberately simpler than hunt.yml: no dashboard-run-row integration
# (scripts/mark_run.py, the `run_id` input) — that's single-user-dashboard
# plumbing owned by H3 / a later task, not this branch's job.
#
# Full required-secrets list lives in docs/OPERATIONS.md — this header
# only calls out the ones worth a second look; see the inline comments
# on each `env:` entry below for what's required vs optional.
#
# HNT-1 (planning/session-prompts/21_user_triggered_hunts.md): scoring is
# no longer automatic-for-everyone. The `schedule:` cron below now runs
# discovery only (`--discovery-only`, zero fan-out/LLM spend) — per-user
# scoring is triggered on demand by `POST /api/hunt/run` (web), which
# `workflow_dispatch`es this same workflow with a `user_id` input. A
# manual `workflow_dispatch` with no `user_id` keeps the original
# discovery+fan-out-everyone behavior, for admin/ad-hoc use.

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: "Score only this user (uuid). Leave blank for a full discovery+fan-out-everyone run."
        required: false
        type: string
  schedule:
    # 10:00 UTC = 6am America/New_York during EDT (most of the year,
    # including now). Drifts to 5am America/New_York during EST
    # (winter) — GHA cron is UTC-only and can't express a DST-aware
    # local time, so this is a deliberate, documented drift rather than
    # something to "fix" here.
    - cron: "0 10 * * *"

jobs:
  hosted-hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code CLI (for OAuth fallback)
        # jobify.hosted.fanout's stage-2 rubric compile and stage-4 LLM
        # verdict route through jobify.shared.llm, same as the single-user
        # scorer — it falls back to the Claude Agent SDK under Max-plan
        # OAuth when ANTHROPIC_API_KEY is absent or benched by a
        # billing/credit failure. The SDK spawns the bundled Claude Code
        # CLI as a subprocess, so it must be on PATH. No-op for the API
        # path — only invoked when the fallback fires.
        run: npm install -g @anthropic-ai/claude-code
      - name: Install package
        run: pip install -e .
      - name: Hosted hunt
        env:
          # The validation gate imports `onboarding.validate_profile`, which
          # is NOT part of the installed package (see repo-root conftest.py).
          # Console scripts don't put the CWD on sys.path, so without this
          # the import fails SILENTLY and profiles are never validation-gated.
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Max-plan OAuth fallback (jobify.shared.llm). Used only when
          # ANTHROPIC_API_KEY is unset or has been benched by a
          # billing/credit/auth failure. Safe to leave empty if not
          # configured — the API path stays primary.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # jobify.hosted.embed — profile/posting embeddings. Soft
          # dependency: EMBEDDINGS_ENABLED defaults true but every call
          # site degrades cleanly (stage 3 skipped, ladder proceeds
          # 1 -> 2 -> 4) when this is unset, per docs/SCORING.md.
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          # Discovery (Task 2) unions ALL nine jobify.hunt.sources
          # fetchers across every hosted user's portals.yml, including
          # the two paid keyword-search sources — not single-user-only,
          # so this workflow needs them too.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          # jobify.hosted.keycrypt — decrypts BYO Anthropic keys pasted
          # in the settings UI (H6) for jobify.hosted.fanout to use.
          # Required once any user has pasted a BYO key; safe to leave
          # unset otherwise — a decrypt failure degrades to the
          # pool-with-caps path rather than crashing the cycle.
          JOBIFY_KEY_ENCRYPTION_SECRET: ${{ secrets.JOBIFY_KEY_ENCRYPTION_SECRET }}
          # jobify.notify.send_ntfy_summary (H7) — optional cycle
          # telemetry push. Unset = skip silently, no console noise.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # jobify.config.HOSTED_GLOBAL_MONTHLY_CAP_USD — optional
          # override of the $100 default whole-pool monthly spend cap.
          HOSTED_GLOBAL_MONTHLY_CAP_USD: ${{ secrets.HOSTED_GLOBAL_MONTHLY_CAP_USD }}
        # schedule (cron) -> discovery only. workflow_dispatch with a
        # user_id input -> fan out for that one user. workflow_dispatch
        # with no input -> original discovery+fan-out-everyone behavior.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            jobify-hosted-hunt --once --discovery-only
          elif [ -n "${{ github.event.inputs.user_id }}" ]; then
            jobify-hosted-hunt --once --user "${{ github.event.inputs.user_id }}"
          else
            jobify-hosted-hunt --once
          fi
