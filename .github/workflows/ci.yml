name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Collect tests
        run: pytest --collect-only
      - name: Run tests
        run: pytest -v

  # ── Identity / infra scrub gate (STUB) ──────────────────────────────────
  # Placeholder for the full gate that Phase F defines in
  # planning/session-prompts/08_phaseF_verify.md: fail the build if any
  # personal or infra identifier reappears anywhere outside the golden test
  # persona (onboarding/examples/, landed by WS-E).
  #
  # It is intentionally a no-op until two upstream workstreams land:
  #   • WS-A scrubs the persona layer out of jobify/ and profile/
  #   • WS-E adds onboarding/examples/ (the allowed home for the fixture)
  # Wiring a real grep here now would fail CI on persona data WS-A still
  # owns. Phase F supplies the identifier list (kept out of this file so the
  # gate doesn't flag itself) and flips this step to a hard failure.
  scrub-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scrub gate (stub — Phase F defines the pattern)
        run: |
          echo "scrub gate stub: no identifier pattern wired yet."
          echo "Phase F (planning/.../08_phaseF_verify.md) replaces this with"
          echo "the real grep gate once WS-A + WS-E have landed."
