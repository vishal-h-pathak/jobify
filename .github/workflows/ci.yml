name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Collect tests
        run: pytest --collect-only
      - name: Run tests
        run: pytest -v

  # ── Identity / infra scrub gate (Phase F) ───────────────────────────────
  # Fails the build if any personal or infra identifier from the original
  # single-user persona reappears outside its allowed home, or if a stray
  # résumé binary lands in the tree. The full logic (token list, allowed
  # homes, binary-document check) lives in scripts/scrub_gate.sh so it can be
  # run locally with `make scrub`.
  scrub-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Identity / infra scrub gate
        run: bash scripts/scrub_gate.sh
