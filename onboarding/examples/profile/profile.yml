# ── background_summary ────────────────────────────────────────────────────
background_summary: |
  Frontend engineer (~7 years) focused on design systems and accessibility.
  Builds the component libraries and tooling that let product teams ship
  consistent, usable interfaces fast — and treats accessibility as a
  correctness property, not a checkbox. Happiest owning the seam between
  design and engineering: tokens, component APIs, and the docs that make them
  adoptable. Looking for a senior design-systems or frontend-platform role at
  a product company that takes craft and inclusivity seriously.

