# design-systems engineer). Produced by running onboarding/SKILL.md against a
# sample resume + a short interview; see ../interview-transcript.md. Everything
# here is invented and obviously fictional — it exists as the shared test
# fixture for the rest of the pipeline (WS-A2 / WS-D / WS-F) and as a worked
# reference for what a finished profile looks like.
#
# This is a SECOND complete persona alongside profile.example/ (a backend
# engineer) on purpose: the two together prove the contract holds across very
# different candidates. Required top-level keys: `identity`,
# `application_defaults`. The rest is strongly recommended.
# ════════════════════════════════════════════════════════════════════════

